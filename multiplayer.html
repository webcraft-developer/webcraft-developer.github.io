<!DOCTYPE HTML>
<html>
<head>
    <title>WebCraft Multiplayer</title>

    <meta charset="UTF-8">
    <link href="style/main.css" rel="stylesheet">

    <!-- Core libraries -->
    <script src="js/glMatrix-1.2.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- Game engine files -->
    <script src="js/blocks.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/world.js"></script>
    <script src="js/render.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/player.js"></script>
    <script src="js/network.js"></script>
</head>

<body oncontextmenu="return false">

    <!-- Render surface -->
    <canvas id="renderSurface" style="visibility:hidden"></canvas>

    <!-- Material selection -->
    <table id="materialSelector" style="display:none">
        <tr></tr>
    </table>

    <!-- Chatbox -->
    <div id="chatbox" style="visibility:hidden">
        <span id="chatbox_text"></span>
    </div>
    <input id="chatbox_entry" type="text" maxlength="100" spellcheck="false"
           onkeypress="onChatEnter(this, event)" style="visibility:hidden" />

    <!-- Nickname box -->
    <div id="nickname">
        <span>Nickname:</span><br>
        <input id="nickname_input" type="text" maxlength="15" spellcheck="false"
               onkeypress="onNicknameEnter(this, event)">
    </div>

    <!-- Joining info -->
    <div id="joininfo" style="visibility:hidden">
        <span id="joininfo_text"></span>
    </div>

<script>
/* ------------------------------
   HTML ELEMENTS
------------------------------ */
const page = {
    renderSurface: document.getElementById("renderSurface"),
    materialSelector: document.getElementById("materialSelector"),
    chatbox: document.getElementById("chatbox"),
    chatboxText: document.getElementById("chatbox_text"),
    chatboxEntry: document.getElementById("chatbox_entry"),
    nickname: document.getElementById("nickname"),
    nicknameInput: document.getElementById("nickname_input"),
    joinInfo: document.getElementById("joininfo"),
    joinInfoText: document.getElementById("joininfo_text")
};

let client, render, world, player;

// Focus nickname field
page.nicknameInput.focus();

/* ------------------------------
   NICKNAME ENTRY
------------------------------ */
function onNicknameEnter(input, e) {
    if (e.keyCode !== 13) return;
    const name = input.value.trim();
    if (!name) return;

    input.blur();
    joinGame(name);
}

/* ------------------------------
   CHAT ENTRY
------------------------------ */
function onChatEnter(input, e) {
    if (e.keyCode !== 13) return;

    const msg = input.value.trim();
    input.blur();
    page.chatbox.style.height = null;

    if (!msg) return;

    client.sendMessage(msg);
    input.value = "";
}

/* ------------------------------
   JOIN GAME
------------------------------ */
function joinGame(nickname) {

    page.nickname.style.visibility = "hidden";
    page.joinInfo.style.visibility = "visible";
    page.joinInfoText.innerHTML = "Connecting to server...";

    client = new Client(io);
    client.connect("https://webcraft-server.onrender.com", nickname);

    client.on("connect", () => {
        page.joinInfoText.innerHTML = "Receiving world...";
    });

    client.on("world", w => {
        world = w;

        page.joinInfoText.innerHTML = "Building chunks...";

        render = new Renderer("renderSurface");
        render.setWorld(world, 8);
        render.setPerspective(60, 0.01, 200);
        render.buildChunks(999);

        page.joinInfoText.innerHTML = "Spawning...";
    });

    client.on("spawn", () => {

        player = new Player();
        player.setWorld(world);
        player.setClient(client);
        player.setInputCanvas("renderSurface");
        player.setMaterialSelector("materialSelector");

        player.on("openChat", () => {
            page.chatboxEntry.focus();
            page.chatbox.style.height = (render.gl.viewportHeight - 145) + "px";
        });

        page.joinInfo.style.visibility = "hidden";
        page.renderSurface.style.visibility = "visible";
        page.materialSelector.style.display = "table";
        page.chatbox.style.visibility = "visible";
        page.chatboxEntry.style.visibility = "visible";

        let lastUpdate = performance.now() / 1000;

        setInterval(() => {
            const now = performance.now() / 1000;

            player.update();

            if (now - lastUpdate > 0.033) {
                client.updatePlayer();
                lastUpdate = now;
            }

            render.buildChunks(5);
            render.setCamera(player.getEyePos().toArray(), player.angles);
            render.draw();

        }, 1);
    });

    client.on("chat", (user, msg) => {
        page.chatboxText.innerHTML += `&lt;<span style="color:#0a0">${user}</span>&gt; ${msg}<br>`;
    });

    client.on("message", msg => {
        page.chatboxText.innerHTML += `<span style="color:#ff8">${msg}</span><br>`;
    });

    client.on("kick", msg => {
        page.joinInfo.style.visibility = "visible";
        page.renderSurface.style.visibility = "hidden";
        page.materialSelector.style.display = "none";
        page.chatbox.style.visibility = "hidden";
        page.chatboxEntry.style.visibility = "hidden";

        page.joinInfoText.innerHTML =
            `<span style="color:#f00;text-shadow:#a00 2px 2px 0px">Kicked:</span> ${msg}`;
    });

    client.on("disconnect", kicked => {
        if (!kicked) {
            page.joinInfo.style.visibility = "visible";
            page.renderSurface.style.visibility = "hidden";
            page.materialSelector.style.display = "none";
            page.chatbox.style.visibility = "hidden";
            page.chatboxEntry.style.visibility = "hidden";

            page.joinInfoText.innerHTML =
                `<span style="color:#f00;text-shadow:#a00 2px 2px 0px">Connection Problem:</span> Lost connection to server!`;
        }
    });
}
</script>

</body>
</html>
