<!DOCTYPE HTML>
<html>
<head>
    <title>WebCraft Singleplayer</title>

    <meta charset="UTF-8">
    <link href="style/main.css" rel="stylesheet">

    <!-- Core libraries -->
    <script src="js/glMatrix-1.2.min.js"></script>

    <!-- Game engine files -->
    <script src="js/blocks.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/world.js"></script>
    <script src="js/render.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/player.js"></script>
</head>

<body oncontextmenu="return false">

    <canvas id="renderSurface"></canvas>

    <table id="materialSelector">
        <tr></tr>
    </table>

<script>
// Create world
const world = new World(16, 16, 16);
world.createFlatWorld(6);

// Renderer
const render = new Renderer("renderSurface");
render.setWorld(world, 8);
render.setPerspective(60, 0.01, 200);

// Physics
const physics = new Physics();
physics.setWorld(world);

// Player
const player = new Player();
player.setWorld(world);
player.setInputCanvas("renderSurface");
player.setMaterialSelector("materialSelector");

// Render loop
setInterval(() => {
    const t = performance.now() / 1000;

    physics.simulate();
    player.update();
    render.buildChunks(1);

    render.setCamera(player.getEyePos().toArray(), player.angles);
    render.draw();

}, 1);
</script>

</body>
</html>
